name: Build

# Runs on every push and PR to validate that frontend, backend, and infra
# all build and pass tests. No AWS credentials are used in this workflow.
#
# Uses arm64 GitHub-hosted runners (ubuntu-24.04-arm) so the backend builds
# and tests natively on the same architecture as the Graviton/ARM Lambda
# target, and to match the deploy workflow's runner architecture.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  frontend:
    name: Frontend (lint, test, build)
    runs-on: ubuntu-24.04-arm
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm run test

      - name: Build
        run: npm run build

  backend:
    name: Backend (fmt, clippy, test, build)
    runs-on: ubuntu-24.04-arm
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-unknown-linux-gnu
          components: clippy, rustfmt

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: backend

      - name: Check formatting
        run: cargo fmt --check

      - name: Clippy (zero warnings)
        run: cargo clippy --all-targets -- -D warnings

      - name: Test
        run: cargo test

      - name: Install Zig (cargo-lambda's linker for Lambda targets)
        uses: mlugg/setup-zig@v2
        with:
          version: "0.13.0"

      - name: Install cargo-lambda
        run: curl -fsSL https://cargo-lambda.info/install.sh | sh

      - name: Build Lambda binaries (arm64, release)
        run: cargo lambda build --release --arm64 --bin api --bin pre_sign_up

      - name: Upload Lambda binaries
        uses: actions/upload-artifact@v4
        with:
          name: lambda-binaries
          path: backend/target/lambda
          retention-days: 14

  infra:
    name: Infra (build, test, synth)
    needs: backend
    runs-on: ubuntu-24.04-arm
    defaults:
      run:
        working-directory: infra
    steps:
      - uses: actions/checkout@v4

      # The CDK stacks reference backend/target/lambda/{api,pre_sign_up} as
      # Lambda asset directories, so synth/tests need the real release
      # binaries on disk to stage as assets.
      - name: Download Lambda binaries
        uses: actions/download-artifact@v4
        with:
          name: lambda-binaries
          path: backend/target/lambda

      # upload-artifact/download-artifact don't preserve the executable
      # bit, so it must be restored before CDK zips these up as assets.
      - name: Restore executable bit on Lambda bootstrap binaries
        run: chmod +x ../backend/target/lambda/*/bootstrap

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: infra/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Test
        run: npm run test

      - name: CDK synth (sanity check, no AWS credentials required)
        run: npx cdk synth --context environment=dev --context region=us-east-2
